; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
monitor_speed = 420000

[xiao_samd21]
platform = atmelsam@8.1.0
platform_packages = platformio/framework-arduino-samd-seeed@1.8.1
board = seeed_xiao
framework = arduino
lib_deps = https://github.com/adafruit/Adafruit_TinyUSB_Arduino.git#0.10.5
lib_archive = no
build_flags =
  -DUSE_TINYUSB
  -DCRSF_SERIAL=Serial1
  -DLED_PIN=13
  -DLED_ON=0
  -DLED_OFF=1

[xiao_rp2040]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
board = seeed_xiao_rp2040
lib_deps = adafruit/Adafruit TinyUSB Library@^3.7.3
build_flags =
  -DUSE_TINYUSB
  -DCRSF_SERIAL=Serial1
  -DLED_PIN=17
  -DLED_ON=0
  -DLED_OFF=1

[pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi
board = pico
board_build.core = earlephilhower
framework = arduino
board_build.filesystem = littlefs
lib_deps = adafruit/Adafruit TinyUSB Library@^3.7.3
build_flags =
  -DUSE_TINYUSB
  -DCRSF_SERIAL=Serial2
  -DLED_PIN=25
  -DLED_ON=1
  -DLED_OFF=0

[env:XIAO_SAMD21]
extends = xiao_samd21

[env:XIAO_SAMD21_Debug]
extends = xiao_samd21
build_flags =
  ${xiao_samd21.build_flags}
  -DDEBUG

[env:XIAO_RP2040]
extends = xiao_rp2040

[env:XIAO_RP2040_Debug]
extends = xiao_rp2040
build_flags =
  ${xiao_rp2040.build_flags}
  -DDEBUG

[env:PICO]
extends = pico

[env:PICO_Debug]
extends = pico
build_flags =
  ${pico.build_flags}
  -DDEBUG
